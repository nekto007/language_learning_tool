[pytest]
# Default: sequential run (~1 min for 2792 tests)
# For parallel: pytest -n 4 --dist loadgroup (each worker gets its own test database)
addopts = -q --tb=short --timeout=60
testpaths = tests

# Custom markers
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow-running
    smoke: marks key happy-path tests for quick validation (run with '-m smoke')

# Ignore deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:pymorphy2
    ignore::DeprecationWarning:pkg_resources
    ignore::sqlalchemy.exc.SAWarning