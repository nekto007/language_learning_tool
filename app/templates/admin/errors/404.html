<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | LLT Admin</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/fonts/fontawesome.min.css">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <style>
        body { background: var(--color-bg, #f8fafc); }
        .admin-error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .admin-error-brand {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-muted, #6b7280);
            margin-bottom: 2rem;
        }
        .admin-error-brand i { margin-right: 0.4rem; }
        .admin-error-code {
            font-size: 6rem;
            font-weight: 700;
            color: var(--color-primary, #4f46e5);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .admin-error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .admin-error-message {
            color: var(--color-text-muted, #6b7280);
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .admin-error-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <div class="admin-error-page">
        <div class="admin-error-brand">
            <i class="fas fa-shield-alt" aria-hidden="true"></i>
            LLT Admin
        </div>
        <div class="admin-error-code" role="img" aria-label="Код ошибки 404">404</div>
        <div class="admin-error-title">Страница не найдена</div>
        <p class="admin-error-message">
            Запрашиваемая страница не существует или была перемещена.
        </p>
        <div class="admin-error-actions">
            <a href="/admin/" class="btn btn-primary">
                <i class="fas fa-home me-2" aria-hidden="true"></i>Вернуться в админку
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2" aria-hidden="true"></i>Назад
            </a>
        </div>
    </div>
</body>
</html>
