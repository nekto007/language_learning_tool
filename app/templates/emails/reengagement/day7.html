<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; margin: 0; padding: 0; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff;">
        <div style="text-align: center; padding: 20px 0;">
            <h1 style="color: #2563eb; font-size: 24px; margin: 0;">LLT English</h1>
        </div>
        <div style="padding: 20px; text-align: center;">
            <p style="font-size: 20px; font-weight: bold; color: #0f172a;">Не теряй прогресс!</p>
            <p style="color: #64748b;">{{ username }}, прошла уже неделя. Ты прошёл {{ lessons_completed }} уроков — не бросай на полпути!</p>
            <div style="background: #f8fafc; border-radius: 12px; padding: 16px; margin: 16px 0;">
                <p style="font-size: 2rem; font-weight: 800; color: #2563eb; margin: 0;">{{ lessons_completed }}</p>
                <p style="color: #64748b; margin: 4px 0 0; font-size: 14px;">уроков пройдено</p>
            </div>
            <p style="color: #64748b;">Вернись и продолжи — всего 10 минут!</p>
            <a href="{{ site_url }}/dashboard" style="display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #2563eb, #0ea5e9); color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 16px;">Вернуться к обучению</a>
        </div>
        <div style="text-align: center; padding: 20px 0; font-size: 12px; color: #94a3b8;">
            <a href="{{ unsubscribe_url }}" style="color: #94a3b8;">Отписаться от рассылки</a>
        </div>
    </div>
</body>
</html>
