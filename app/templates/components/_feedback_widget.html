{# In-app feedback widget: floating launcher + modal.
   Posts multipart to /api/feedback (login_required, rate-limited).
   Captures optional screenshot + page-info meta. #}
<button type="button"
        id="feedback-fab"
        class="feedback-fab"
        aria-label="Сообщить о баге или предложить идею"
        title="Обратная связь">
    <i class="fas fa-comment-dots" aria-hidden="true"></i>
</button>

<div id="feedback-modal" class="feedback-modal" role="dialog" aria-modal="true" aria-labelledby="feedback-modal-title" hidden>
    <div class="feedback-modal__backdrop" data-feedback-close="true"></div>
    <div class="feedback-modal__panel" role="document">
        <div class="feedback-modal__header">
            <h2 id="feedback-modal-title" class="feedback-modal__title">Обратная связь</h2>
            <button type="button" class="feedback-modal__close" data-feedback-close="true" aria-label="Закрыть">
                &times;
            </button>
        </div>
        <form id="feedback-form" class="feedback-modal__body" enctype="multipart/form-data">
            <fieldset class="feedback-modal__categories">
                <legend class="feedback-modal__label">Что хочется сказать?</legend>
                <label class="feedback-cat">
                    <input type="radio" name="category" value="bug" required>
                    <span class="feedback-cat__badge feedback-cat__badge--bug">Баг</span>
                    <span class="feedback-cat__hint">Что-то сломалось или ведёт себя не так</span>
                </label>
                <label class="feedback-cat">
                    <input type="radio" name="category" value="idea">
                    <span class="feedback-cat__badge feedback-cat__badge--idea">Идея</span>
                    <span class="feedback-cat__hint">Что добавить или улучшить</span>
                </label>
                <label class="feedback-cat">
                    <input type="radio" name="category" value="question">
                    <span class="feedback-cat__badge feedback-cat__badge--question">Вопрос</span>
                    <span class="feedback-cat__hint">Что-то непонятно</span>
                </label>
            </fieldset>
            <label class="feedback-modal__label" for="feedback-message">Сообщение</label>
            <textarea id="feedback-message"
                      name="message"
                      class="feedback-modal__textarea"
                      rows="5"
                      maxlength="4000"
                      placeholder="Опишите, что произошло или что предлагаете. Если это баг — какие шаги привели к ошибке."
                      required></textarea>

            <label class="feedback-modal__label feedback-modal__label--attach" for="feedback-screenshot">
                Скриншот <span class="feedback-modal__hint-inline">(необязательно, PNG/JPG/WEBP до 5 МБ)</span>
            </label>
            <input type="file"
                   id="feedback-screenshot"
                   name="screenshot"
                   accept="image/png,image/jpeg,image/gif,image/webp"
                   class="feedback-modal__file">
            <div id="feedback-screenshot-preview" class="feedback-modal__preview" hidden>
                <img id="feedback-screenshot-img" alt="Превью скриншота">
                <button type="button" id="feedback-screenshot-clear" class="feedback-modal__preview-clear" aria-label="Удалить скриншот">&times;</button>
            </div>

            <p id="feedback-error" class="feedback-modal__error" role="alert" hidden></p>
            <div class="feedback-modal__actions">
                <button type="button" class="feedback-modal__btn feedback-modal__btn--ghost" data-feedback-close="true">
                    Отмена
                </button>
                <button type="submit" id="feedback-submit" class="feedback-modal__btn feedback-modal__btn--primary">
                    Отправить
                </button>
            </div>
        </form>
        <div id="feedback-success" class="feedback-modal__success" hidden>
            <i class="fas fa-check-circle"></i>
            <p>Спасибо! Передали команде.</p>
            <a id="feedback-success-link" href="#" class="feedback-modal__success-link">Открыть переписку →</a>
        </div>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
(function() {
    var fab = document.getElementById('feedback-fab');
    var modal = document.getElementById('feedback-modal');
    var form = document.getElementById('feedback-form');
    var submitBtn = document.getElementById('feedback-submit');
    var errorBox = document.getElementById('feedback-error');
    var successBox = document.getElementById('feedback-success');
    var successLink = document.getElementById('feedback-success-link');
    var screenshotInput = document.getElementById('feedback-screenshot');
    var preview = document.getElementById('feedback-screenshot-preview');
    var previewImg = document.getElementById('feedback-screenshot-img');
    var previewClear = document.getElementById('feedback-screenshot-clear');
    if (!fab || !modal || !form) return;

    var MAX_BYTES = 5 * 1024 * 1024;
    var inFlight = false;

    function open() {
        modal.hidden = false;
        document.body.classList.add('feedback-modal-open');
        setTimeout(function() {
            var firstRadio = modal.querySelector('input[name="category"]');
            if (firstRadio) firstRadio.focus();
        }, 0);
    }
    function close() {
        modal.hidden = true;
        document.body.classList.remove('feedback-modal-open');
        successBox.hidden = true;
        form.hidden = false;
        form.reset();
        errorBox.hidden = true;
        errorBox.textContent = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить';
        preview.hidden = true;
        previewImg.removeAttribute('src');
        if (successLink) successLink.removeAttribute('href');
        inFlight = false;
    }

    fab.addEventListener('click', open);
    modal.querySelectorAll('[data-feedback-close="true"]').forEach(function(el) {
        el.addEventListener('click', close);
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !modal.hidden) close();
    });

    if (screenshotInput) {
        screenshotInput.addEventListener('change', function() {
            errorBox.hidden = true;
            errorBox.textContent = '';
            var file = screenshotInput.files && screenshotInput.files[0];
            if (!file) {
                preview.hidden = true;
                previewImg.removeAttribute('src');
                return;
            }
            if (file.size > MAX_BYTES) {
                errorBox.textContent = 'Скриншот больше 5 МБ. Сожмите или сделайте меньшую область.';
                errorBox.hidden = false;
                screenshotInput.value = '';
                preview.hidden = true;
                return;
            }
            var reader = new FileReader();
            reader.onload = function(ev) {
                previewImg.src = ev.target.result;
                preview.hidden = false;
            };
            reader.readAsDataURL(file);
        });
    }
    if (previewClear) {
        previewClear.addEventListener('click', function() {
            screenshotInput.value = '';
            preview.hidden = true;
            previewImg.removeAttribute('src');
        });
    }

    function collectMeta() {
        var meta = {};
        try { meta.viewport_width = String(window.innerWidth || ''); } catch (e) {}
        try { meta.viewport_height = String(window.innerHeight || ''); } catch (e) {}
        try { meta.screen_width = String((screen && screen.width) || ''); } catch (e) {}
        try { meta.screen_height = String((screen && screen.height) || ''); } catch (e) {}
        try { meta.device_pixel_ratio = String(window.devicePixelRatio || ''); } catch (e) {}
        try { meta.locale = navigator.language || ''; } catch (e) {}
        try {
            meta.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        } catch (e) {}
        try { meta.platform = navigator.platform || ''; } catch (e) {}
        return meta;
    }

    function submit() {
        if (inFlight) return;
        errorBox.hidden = true;
        errorBox.textContent = '';

        var category = (form.querySelector('input[name="category"]:checked') || {}).value;
        var message = (form.querySelector('#feedback-message').value || '').trim();
        if (!category) {
            errorBox.textContent = 'Выберите категорию.';
            errorBox.hidden = false;
            return;
        }
        if (!message) {
            errorBox.textContent = 'Опишите, что хотите сообщить.';
            errorBox.hidden = false;
            return;
        }

        inFlight = true;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправляю…';

        var metaTag = document.querySelector('meta[name="csrf-token"]');
        var csrf = metaTag ? metaTag.getAttribute('content') : '';
        var meta = collectMeta();

        var fd = new FormData();
        fd.append('category', category);
        fd.append('message', message);
        fd.append('url', window.location.href);
        Object.keys(meta).forEach(function(k) {
            if (meta[k]) fd.append(k, meta[k]);
        });
        var file = screenshotInput && screenshotInput.files && screenshotInput.files[0];
        if (file) fd.append('screenshot', file, file.name || 'screenshot.png');

        fetch('/api/feedback', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'X-CSRFToken': csrf,
                'Accept': 'application/json',
            },
            body: fd,
        }).then(function(r) {
            if (r.ok) {
                return r.json().catch(function() { return {}; }).then(function(body) {
                    form.hidden = true;
                    successBox.hidden = false;
                    if (successLink && body.thread_url) {
                        successLink.href = body.thread_url;
                    } else if (successLink) {
                        successLink.style.display = 'none';
                    }
                    inFlight = false;
                });
            }
            return r.json().catch(function() { return {}; }).then(function(body) {
                var msg = (body && body.message) ? body.message :
                          (r.status === 429 ? 'Слишком много отправок. Попробуйте позже.' :
                          'Не удалось отправить. Попробуйте позже.');
                errorBox.textContent = msg;
                errorBox.hidden = false;
                inFlight = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Отправить';
            });
        }).catch(function() {
            errorBox.textContent = 'Сеть недоступна. Проверьте подключение.';
            errorBox.hidden = false;
            inFlight = false;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить';
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        submit();
    });

    form.querySelector('#feedback-message').addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            submit();
        }
    });
})();
</script>
