{% if request.args.get('from') == 'daily_plan' %}
<div id="daily-plan-bar" style="display:none;">
    <a href="{{ url_for('words.dashboard') }}" class="dp-bar__link">
        <div class="dp-bar__progress">
            <!-- dots filled dynamically -->
        </div>
        <span class="dp-bar__text"></span>
    </a>
    <a id="dp-bar__next" class="dp-bar__btn" href="#">→ Следующий шаг</a>
</div>
<style>
#daily-plan-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 48px;
    background: linear-gradient(135deg, #5046e5 0%, #7c3aed 100%);
    color: #fff;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 16px;
    font-family: "Onest", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(80, 70, 229, 0.3);
}
.dp-bar__link {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    text-decoration: none;
    transition: opacity 0.15s;
}
.dp-bar__link:hover {
    opacity: 0.85;
    color: #fff;
    text-decoration: none;
}
.dp-bar__progress {
    display: flex;
    align-items: center;
    gap: 6px;
}
.dp-bar__dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: transparent;
    transition: all 0.3s;
}
.dp-bar__dot--done {
    background: #34d399;
    border-color: #34d399;
}
.dp-bar__dot--current {
    border-color: #fff;
    background: transparent;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
}
.dp-bar__dot--upcoming {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.25);
}
.dp-bar__text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
}
.dp-bar__btn {
    display: inline-block;
    background: #fff;
    color: #5046e5;
    text-decoration: none;
    padding: 4px 14px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.8125rem;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
}
.dp-bar__btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    color: #5046e5;
    text-decoration: none;
}
.dp-bar__btn--done {
    background: #34d399;
    color: #fff;
}
.dp-bar__btn--done:hover {
    color: #fff;
}
#daily-plan-bar.dp-bar--visible ~ .navbar,
#daily-plan-bar.dp-bar--visible ~ nav.navbar {
    margin-top: 48px;
}
@media (max-width: 576px) {
    .dp-bar__text {
        max-width: 140px;
        font-size: 0.75rem;
    }
    .dp-bar__btn {
        padding: 3px 10px;
        font-size: 0.75rem;
    }
}
</style>
<script>
(function() {
    'use strict';

    var bar = document.getElementById('daily-plan-bar');
    if (!bar) return;

    var headers = {};
    var jwtToken = localStorage.getItem('jwt_token');
    if (jwtToken) {
        headers['Authorization'] = 'Bearer ' + jwtToken;
    }

    fetch('/api/daily-plan/next-step', {
        credentials: 'same-origin',
        headers: headers
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var total = data.steps_total || 0;
        var done = data.steps_done || 0;
        if (total === 0) return;

        // Build dots
        var dotsHtml = '';
        for (var i = 0; i < total; i++) {
            var cls = 'dp-bar__dot';
            if (i < done) {
                cls += ' dp-bar__dot--done';
            } else if (i === done && !data.all_done) {
                cls += ' dp-bar__dot--current';
            } else {
                cls += ' dp-bar__dot--upcoming';
            }
            dotsHtml += '<span class="' + cls + '"></span>';
        }
        bar.querySelector('.dp-bar__progress').innerHTML = dotsHtml;

        // Text & button
        var textEl = bar.querySelector('.dp-bar__text');
        var btnEl = document.getElementById('dp-bar__next');

        if (data.all_done) {
            textEl.textContent = '\u0428\u0430\u0433 ' + done + ' \u0438\u0437 ' + total;
            btnEl.textContent = '\u2728 \u041f\u043b\u0430\u043d \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d!';
            btnEl.href = '/dashboard';
            btnEl.classList.add('dp-bar__btn--done');
        } else {
            var currentStep = done + 1;
            textEl.textContent = '\u0428\u0430\u0433 ' + currentStep + ' \u0438\u0437 ' + total;
            btnEl.textContent = '\u2192 \u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0448\u0430\u0433';
            btnEl.href = data.step_url || '/dashboard';
        }

        // Show bar & offset body
        bar.style.display = 'flex';
        bar.classList.add('dp-bar--visible');
        document.body.style.paddingTop = '48px';
    })
    .catch(function(err) {
        console.error('Daily plan bar error:', err);
    });
})();
</script>
{% endif %}
