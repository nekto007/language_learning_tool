{# Share buttons component
   Parameters:
     - share_text: text to share (required)
     - share_url: URL to share (optional, defaults to current page)
     - variant: 'inline' (default) or 'compact'
#}
{% set url = share_url|default(request.url) %}
{% set text = share_text|default('') %}

<div class="share-buttons {% if variant == 'compact' %}share-buttons--compact{% endif %}">
    <button class="share-btn share-btn--telegram"
            onclick="shareVia('telegram', '{{ text|e }}', '{{ url|e }}')"
            title="Поделиться в Telegram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
        <span class="share-btn__label">Telegram</span>
    </button>

    <button class="share-btn share-btn--linkedin"
            onclick="shareVia('linkedin', '{{ text|e }}', '{{ url|e }}')"
            title="Поделиться в LinkedIn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        <span class="share-btn__label">LinkedIn</span>
    </button>

    <button class="share-btn share-btn--copy"
            onclick="shareVia('copy', '{{ text|e }}', '{{ url|e }}')"
            title="Скопировать ссылку">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span class="share-btn__label">Копировать</span>
    </button>
</div>

<style>
.share-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.share-buttons--compact {
    gap: 6px;
}

.share-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #fff;
    color: #475569;
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
}

.share-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.share-btn--telegram:hover {
    background: #0088cc;
    color: #fff;
    border-color: #0088cc;
}

.share-btn--linkedin:hover {
    background: #0077b5;
    color: #fff;
    border-color: #0077b5;
}

.share-btn--copy:hover {
    background: #f1f5f9;
    border-color: #cbd5e1;
}

.share-btn--copy.share-btn--copied {
    background: #dcfce7;
    border-color: #86efac;
    color: #166534;
}

.share-buttons--compact .share-btn {
    padding: 6px 10px;
    font-size: 0.75rem;
}

.share-buttons--compact .share-btn__label {
    display: none;
}

.share-buttons--compact .share-btn svg {
    width: 16px;
    height: 16px;
}

@media (max-width: 640px) {
    .share-btn__label {
        display: none;
    }
    .share-btn {
        padding: 8px;
    }
}
</style>
